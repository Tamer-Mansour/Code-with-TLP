            solution_code:
              python: |
                import sys

                def solve():
                    versions = [line.strip() for line in sys.stdin.read().splitlines() if line.strip()]
                    def key(v):
                        parts = v.split('.')
                        return (int(parts[0]), int(parts[1]), int(parts[2]))
