      - slug: diff-classifier-exercise
        title: "Exercise: Classify Diff Lines"
        type: exercise
        duration_minutes: 20
        content_file: lessons/diff-classifier-exercise.md
        exercises:
          - slug: swe-diff-classifier
            title: "Classify Diff Lines"
            difficulty: medium
            points: 20
            prompt_file: lessons/swe-diff-classifier.prompt.md
            supported_languages: [python]
            tags: [strings, parsing, git]
            time_limit_ms: 3000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys

                def solve():
                    added = removed = unchanged = 0
                    for line in sys.stdin:
                        # TODO: classify line and count
                        pass
                    print(f"added: {added}")
                    print(f"removed: {removed}")
                    print(f"unchanged: {unchanged}")
                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    added = removed = unchanged = 0
                    for line in sys.stdin:
                        # Keep raw line (don't strip) to detect leading space
                        if line.startswith('+++') or line.startswith('---'):
                            continue
                        elif line.startswith('+'):
                            added += 1
                        elif line.startswith('-'):
                            removed += 1
                        elif line.startswith(' '):
                            unchanged += 1
                        # else: @@ header or empty — ignore
                    print(f"added: {added}")
                    print(f"removed: {removed}")
                    print(f"unchanged: {unchanged}")

                solve()
            test_cases:
              - name: basic-diff
                stdin: "--- a/auth.py\n+++ b/auth.py\n@@ -10,7 +10,8 @@\n def login(user, password):\n-    return check(user, password)\n+    if not user:\n+        return None\n+    return verify(user, password)\n \n def logout(user):\n"
                expected_stdout: "added: 3\nremoved: 1\nunchanged: 3"
                is_hidden: false
                weight: 1
              - name: only-additions
                stdin: "+new line 1\n+new line 2\n+++ b/file.py\n"
                expected_stdout: "added: 2\nremoved: 0\nunchanged: 0"
                is_hidden: false
                weight: 1
              - name: only-removals
                stdin: "-old line\n--- a/file.py\n"
                expected_stdout: "added: 0\nremoved: 1\nunchanged: 0"
                is_hidden: false
                weight: 1
              - name: all-zeros
                stdin: "@@ -1,3 +1,3 @@\n--- a/file.py\n+++ b/file.py\n"
                expected_stdout: "added: 0\nremoved: 0\nunchanged: 0"
                is_hidden: true
                weight: 1
              - name: mixed-large
