        type: exercise
        duration_minutes: 20
        content_file: lessons/commit-message-exercise.md
        exercises:
          - slug: swe-commit-validator
            title: "Conventional Commit Message Validator"
            difficulty: easy
            points: 15
            prompt_file: lessons/swe-commit-validator.prompt.md
            supported_languages: [python]
            tags: [strings, validation, git]
            time_limit_ms: 3000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        msg = line.rstrip('\n')
                        # TODO: print valid or invalid
                solve()
            solution_code:
              python: |
                import sys

                VALID_TYPES = {'feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore'}

                def is_valid(msg):
                    colon_space = ': '
                    idx = msg.find(colon_space)
                    if idx == -1:
                        return False
                    type_part = msg[:idx]
                    description = msg[idx + 2:]
                    return type_part in VALID_TYPES and len(description.strip()) > 0

                def solve():
                    for line in sys.stdin:
                        msg = line.rstrip('\n')
                        print('valid' if is_valid(msg) else 'invalid')

                solve()
            test_cases:
              - name: valid-feat
                stdin: "feat: add login endpoint\n"
                expected_stdout: "valid"
                is_hidden: false
                weight: 1
              - name: invalid-uppercase
                stdin: "Fix: wrong capitalisation\n"
                expected_stdout: "invalid"
                is_hidden: false
                weight: 1
              - name: valid-docs
                stdin: "docs: update README\n"
                expected_stdout: "valid"
                is_hidden: false
                weight: 1
              - name: invalid-missing-space
                stdin: "chore:missing space after colon\n"
                expected_stdout: "invalid"
                is_hidden: false
                weight: 1
              - name: multi-line-mixed
                stdin: "feat: add login endpoint\nFix: wrong type capitalisation\ndocs: update README\nchore:missing space\ntest: write unit tests for auth\nrandom commit message\n"
                expected_stdout: "valid\ninvalid\nvalid\ninvalid\nvalid\ninvalid"
                is_hidden: true
                weight: 2
              - name: invalid-empty-description
                stdin: "feat:  \n"
                expected_stdout: "invalid"
                is_hidden: true
                weight: 1
              - name: valid-refactor
                stdin: "refactor: extract payment service\n"
                expected_stdout: "valid"
                is_hidden: true
                weight: 1

      - slug: commit-type-counter-exercise
        title: "Exercise: Count Conventional Commit Types"
        type: exercise
        duration_minutes: 20
        content_file: lessons/commit-type-counter-exercise.md
        exercises:
          - slug: swe-commit-counter
            title: "Count Conventional Commit Types"
            difficulty: medium
            points: 20
            prompt_file: lessons/swe-commit-counter.prompt.md
            supported_languages: [python]
            tags: [strings, parsing, git, counting]
            time_limit_ms: 3000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        msg = line.rstrip('\n')
                        # TODO: parse and count by type
                solve()
            solution_code:
              python: |
                import sys
                import re

                VALID_TYPES = {'feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore'}
                # Matches: type, optional (scope), optional !, ": "
                PATTERN = re.compile(r'^([a-z]+)(?:\([^)]+\))?!?: .+')

                def solve():
                    counts = {}
                    for line in sys.stdin:
                        msg = line.rstrip('\n')
                        m = PATTERN.match(msg)
                        if m:
                            t = m.group(1)
                            if t in VALID_TYPES:
                                counts[t] = counts.get(t, 0) + 1
                    for t in sorted(counts):
                        print(f"{t}: {counts[t]}")

                solve()
            test_cases:
              - name: basic-mixed
                stdin: "feat: add login\nfix: null pointer in auth\nfeat(auth): add logout\nchore: upgrade deps\ndocs: update README\nfix!: remove broken endpoint\nrandom commit message\n"
                expected_stdout: "chore: 1\ndocs: 1\nfeat: 2\nfix: 2"
                is_hidden: false
                weight: 1
              - name: single-type
                stdin: "feat: first feature\nfeat: second feature\nfeat(scope): third feature\n"
                expected_stdout: "feat: 3"
                is_hidden: false
                weight: 1
              - name: all-invalid
                stdin: "Fix: caps\nrandom\n: no type\n"
                expected_stdout: ""
                is_hidden: false
                weight: 1
              - name: breaking-change-counted
                stdin: "feat!: redesign API\nfeat(scope)!: another breaking\n"
                expected_stdout: "feat: 2"
                is_hidden: true
                weight: 1
              - name: all-types
                stdin: "feat: a\nfix: b\ndocs: c\nstyle: d\nrefactor: e\ntest: f\nchore: g\n"
                expected_stdout: "chore: 1\ndocs: 1\nfeat: 1\nfix: 1\nrefactor: 1\nstyle: 1\ntest: 1"
                is_hidden: true
                weight: 2
              - name: ignore-unknown-types
                stdin: "feat: a\nwip: half done\nbuild: compile\nfeat: b\n"
                expected_stdout: "feat: 2"
                is_hidden: true
                weight: 1

