            supported_languages: [python]
            tags: [math, strings, testing]
            time_limit_ms: 3000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        line = line.strip()
                        if not line:
                            continue
                        # TODO: parse total and covered, compute coverage %
                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        line = line.strip()
                        if not line:
                            continue
                        parts = line.split()
                        total = int(parts[0])
                        covered = int(parts[1])
                        if total == 0:
                            print("N/A")
                        else:
                            pct = (covered / total) * 100
                            print(f"{round(pct, 1)}%")

                solve()
            test_cases:
