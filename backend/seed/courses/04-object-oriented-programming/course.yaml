              python: |
                import sys

                class TrafficLight:
                    STATES = ["RED", "GREEN", "YELLOW"]

                    def __init__(self):
                        self._index = 0
                        self._count = 0

                    def next(self):
                        self._index = (self._index + 1) % len(self.STATES)
                        self._count += 1

                    def state(self):
                        return self.STATES[self._index]

                    def count(self):
                        return self._count

                    def reset(self):
                        self._index = 0

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    light = TrafficLight()
                    for i in range(1, n + 1):
                        cmd = data[i].strip()
                        if cmd == "NEXT":
                            light.next()
                        elif cmd == "STATE":
                            print(light.state())
                        elif cmd == "COUNT":
                            print(light.count())
                        elif cmd == "RESET":
                            light.reset()
                solve()
            test_cases:
