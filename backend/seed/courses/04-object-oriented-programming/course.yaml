            solution_code:
              python: |
                import sys

                class Stack:
                    def __init__(self):
                        self._items = []

                    def push(self, item):
                        self._items.append(item)

                    def pop(self):
                        if not self._items:
                            return None
                        return self._items.pop()

                    def peek(self):
                        if not self._items:
                            return None
                        return self._items[-1]

                    def size(self):
                        return len(self._items)

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    stack = Stack()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd == "PUSH":
                            stack.push(int(parts[1]))
                        elif cmd == "POP":
                            val = stack.pop()
                            print(val if val is not None else "EMPTY")
                        elif cmd == "PEEK":
                            val = stack.peek()
                            print(val if val is not None else "EMPTY")
                        elif cmd == "SIZE":
                            print(stack.size())
                solve()
            test_cases:
              - name: push-peek-pop
                stdin: "7\nPUSH 10\nPUSH 20\nPEEK\nSIZE\nPOP\nPOP\nPOP\n"
