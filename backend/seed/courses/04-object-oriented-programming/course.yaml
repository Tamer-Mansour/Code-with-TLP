            solution_code:
              python: |
                import sys

                class Book:
                    def __init__(self, title, author):
                        self.title = title
                        self.author = author

                class Shelf:
                    def __init__(self, name):
                        self.name = name
                        self.books = []

                class Library:
                    def __init__(self):
                        self.shelves = {}

                    def add_shelf(self, name):
                        self.shelves[name] = Shelf(name)

                    def add_book(self, shelf_name, title, author):
                        self.shelves[shelf_name].books.append(Book(title, author))

                    def list_shelf(self, shelf_name):
                        books = self.shelves[shelf_name].books
                        if not books:
                            print("EMPTY")
                        else:
                            for b in books:
                                print(f"{b.title} by {b.author}")

                    def search(self, title):
                        for shelf in self.shelves.values():
                            for b in shelf.books:
                                if b.title == title:
                                    print(shelf.name)
                                    return
                        print("NOT FOUND")

                    def count(self, shelf_name):
                        print(len(self.shelves[shelf_name].books))

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    lib = Library()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd == "ADD_SHELF":
                            lib.add_shelf(parts[1])
                        elif cmd == "ADD_BOOK":
                            lib.add_book(parts[1], parts[2], parts[3])
                        elif cmd == "LIST_SHELF":
                            lib.list_shelf(parts[1])
                        elif cmd == "SEARCH":
                            lib.search(parts[1])
                        elif cmd == "COUNT":
                            lib.count(parts[1])
                solve()
            test_cases:
              - name: basic-catalog
                stdin: "8\nADD_SHELF fiction\nADD_SHELF science\nADD_BOOK fiction Dune Herbert\nADD_BOOK fiction Foundation Asimov\nADD_BOOK science ABriefHistory Hawking\nLIST_SHELF fiction\nCOUNT science\nSEARCH Foundation\n"
                expected_stdout: "Dune by Herbert\nFoundation by Asimov\n1\nfiction"
                is_hidden: false
                weight: 1
              - name: empty-shelf
                stdin: "2\nADD_SHELF empty\nLIST_SHELF empty\n"
                expected_stdout: "EMPTY"
                is_hidden: false
                weight: 1
              - name: search-not-found
                stdin: "3\nADD_SHELF sf\nADD_BOOK sf Dune Herbert\nSEARCH UnknownBook\n"
                expected_stdout: "NOT FOUND"
                is_hidden: false
