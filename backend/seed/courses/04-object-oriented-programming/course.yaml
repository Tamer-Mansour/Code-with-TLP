            solution_code:
              python: |
                import sys
                from collections import defaultdict

                class EventBus:
                    def __init__(self):
                        self._subscribers = defaultdict(list)

                    def subscribe(self, event, observer):
                        self._subscribers[event].append(observer)

                    def unsubscribe(self, event, observer):
                        if observer in self._subscribers[event]:
                            self._subscribers[event].remove(observer)

                    def fire(self, event, data):
                        for obs in self._subscribers[event]:
                            print(f"{obs} received {data}")

                    def count(self, event):
                        return len(self._subscribers[event])

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    bus = EventBus()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd == "SUBSCRIBE":
                            bus.subscribe(parts[1], parts[2])
                        elif cmd == "UNSUBSCRIBE":
                            bus.unsubscribe(parts[1], parts[2])
                        elif cmd == "FIRE":
                            bus.fire(parts[1], parts[2])
                        elif cmd == "COUNT":
                            print(bus.count(parts[1]))
                solve()
            test_cases:
              - name: subscribe-fire-unsub
                stdin: "8\nSUBSCRIBE click buttonA\nSUBSCRIBE click buttonB\nSUBSCRIBE hover tooltip\nFIRE click pressed\nCOUNT click\nUNSUBSCRIBE click buttonA\nFIRE click pressed\nCOUNT click\n"
                expected_stdout: "buttonA received pressed\nbuttonB received pressed\n2\nbuttonB received pressed\n1"
