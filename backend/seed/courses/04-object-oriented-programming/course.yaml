            solution_code:
              python: |
                import sys

                class BankAccount:
                    def __init__(self):
                        self.balance = 0

                    def deposit(self, amount):
                        self.balance += amount

                    def withdraw(self, amount):
                        if amount > self.balance:
                            return False
                        self.balance -= amount
                        return True

                    def get_balance(self):
                        return self.balance

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    account = BankAccount()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd == "DEPOSIT":
                            account.deposit(int(parts[1]))
                        elif cmd == "WITHDRAW":
                            ok = account.withdraw(int(parts[1]))
                            if not ok:
                                print("INSUFFICIENT FUNDS")
                        elif cmd == "BALANCE":
                            print(account.get_balance())
                solve()
