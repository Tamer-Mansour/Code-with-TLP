            solution_code:
              python: |
                import sys
                from collections import defaultdict

                class ScoreTracker:
                    def __init__(self):
                        self._scores = {}
                        self._subscribers = defaultdict(list)

                    def subscribe(self, player, observer):
                        self._subscribers[player].append(observer)

                    def unsubscribe(self, player, observer):
                        if observer in self._subscribers[player]:
                            self._subscribers[player].remove(observer)

                    def _notify(self, player):
                        score = self._scores[player]
                        for obs in self._subscribers[player]:
                            print(f"{obs} notified: {player} score is {score}")

                    def set_score(self, player, score):
                        self._scores[player] = score
                        self._notify(player)

                    def add_score(self, player, delta):
                        self._scores[player] = self._scores.get(player, 0) + delta
                        self._notify(player)

                    def get_score(self, player):
                        return self._scores.get(player, 0)

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    tracker = ScoreTracker()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd == "SUBSCRIBE":
                            tracker.subscribe(parts[1], parts[2])
                        elif cmd == "UNSUBSCRIBE":
                            tracker.unsubscribe(parts[1], parts[2])
                        elif cmd == "SET":
                            tracker.set_score(parts[1], int(parts[2]))
                        elif cmd == "ADD":
                            tracker.add_score(parts[1], int(parts[2]))
                        elif cmd == "SCORE":
                            print(tracker.get_score(parts[1]))
                solve()
            test_cases:
              - name: basic-observer
                stdin: "7\nSUBSCRIBE alice watcherA\nSUBSCRIBE alice watcherB\nSET alice 10\nSCORE alice\nUNSUBSCRIBE alice watcherA\nADD alice 5\nSCORE alice\n"
                expected_stdout: "watcherA notified: alice score is 10\nwatcherB notified: alice score is 10\n10\nwatcherB notified: alice score is 15\n15"
                is_hidden: false
                weight: 1
              - name: score-unknown-player
