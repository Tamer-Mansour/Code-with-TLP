            solution_code:
              python: |
                import sys

                class Calculator:
                    def __init__(self):
                        self._value = 0
                        self._history = []
                        self._undone = []

                    def _apply_op(self, op, n):
                        if op == "ADD":
                            self._value += n
                        elif op == "SUB":
                            self._value -= n
                        elif op == "MUL":
                            self._value *= n

                    def _reverse_op(self, op, n):
                        if op == "ADD":
                            self._value -= n
                        elif op == "SUB":
                            self._value += n
                        elif op == "MUL":
                            self._value //= n

                    def apply(self, op, n):
                        self._apply_op(op, n)
                        self._history.append((op, n))
                        self._undone.clear()

                    def undo(self):
                        if not self._history:
                            print("NOTHING TO UNDO")
                            return
                        op, n = self._history.pop()
                        self._reverse_op(op, n)
                        self._undone.append((op, n))

                    def redo(self):
                        if not self._undone:
                            print("NOTHING TO REDO")
                            return
                        op, n = self._undone.pop()
                        self._apply_op(op, n)
                        self._history.append((op, n))

                    def value(self):
                        return self._value

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    calc = Calculator()
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        cmd = parts[0]
                        if cmd in ("ADD", "SUB", "MUL"):
                            calc.apply(cmd, int(parts[1]))
                        elif cmd == "VALUE":
                            print(calc.value())
                        elif cmd == "UNDO":
                            calc.undo()
                        elif cmd == "REDO":
                            calc.redo()
                solve()
            test_cases:
              - name: basic-undo-redo
                stdin: "8\nADD 10\nMUL 3\nVALUE\nUNDO\nVALUE\nREDO\nVALUE\nUNDO\n"
                expected_stdout: "30\n10\n30"
                is_hidden: false
                weight: 1
              - name: nothing-to-undo
                stdin: "3\nVALUE\nUNDO\nVALUE\n"
                expected_stdout: "0\nNOTHING TO UNDO\n0"
                is_hidden: false
                weight: 1
              - name: nothing-to-redo
                stdin: "2\nREDO\nVALUE\n"
                expected_stdout: "NOTHING TO REDO\n0"
                is_hidden: false
                weight: 1
              - name: new-op-clears-redo
                stdin: "7\nADD 5\nADD 3\nUNDO\nADD 10\nREDO\nVALUE\nVALUE\n"
                expected_stdout: "NOTHING TO REDO\n15\n15"
                is_hidden: true
                weight: 1
              - name: subtraction-undo
