            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    w = int(data[0])
                    b = int(data[1])
                    x = int(data[2])
                    y = int(data[3])
                    p = int(data[4])
                    q = int(data[5])
                    alpha = p / q
                    y_hat = w * x + b
                    dLdw = 2 * (y_hat - y) * x
                    dLdb = 2 * (y_hat - y)
                    w_new = w - alpha * dLdw
                    b_new = b - alpha * dLdb
                    print(f"w: {w_new:.2f}")
                    print(f"b: {b_new:.2f}")

                solve()
            test_cases:
              - name: basic-update
                stdin: "1 0 2 6\n1 10\n"
                expected_stdout: "w: 2.60\nb: 0.80"
                is_hidden: false
                weight: 1
              - name: overshoot-case
