            solution_code:
              python: |
                import sys
                from collections import deque

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    n = int(data[idx]); idx += 1
                    e = int(data[idx]); idx += 1
                    adj = {i: [] for i in range(n)}
                    for _ in range(e):
                        u = int(data[idx]); idx += 1
                        v = int(data[idx]); idx += 1
                        adj[u].append(v)
                        adj[v].append(u)
                    src = int(data[idx]); idx += 1
                    dst = int(data[idx]); idx += 1
                    if src == dst:
                        print(0)
                        return
                    visited = {src}
                    q = deque([(src, 0)])
                    while q:
                        node, dist = q.popleft()
                        for nb in adj[node]:
                            if nb == dst:
                                print(dist + 1)
                                return
                            if nb not in visited:
                                visited.add(nb)
                                q.append((nb, dist + 1))
                    print(-1)

                solve()
