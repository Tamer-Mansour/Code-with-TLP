                import sys
                import math

                def solve():
                    lines = sys.stdin.read().splitlines()
                    n = int(lines[0])
                    weights = list(map(float, lines[1].split()))
                    features = list(map(float, lines[2].split()))
                    z = weights[0]
                    for w, x in zip(weights[1:], features):
                        z += w * x
                    p = 1.0 / (1.0 + math.exp(-z))
                    prediction = 1 if p >= 0.5 else 0
                    print(f"z: {z:.4f}")
                    print(f"p: {p:.4f}")
