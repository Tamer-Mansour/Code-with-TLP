            solution_code:
              python: |
                import sys
                import math

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    k = int(data[idx]); idx += 1
                    n = int(data[idx]); idx += 1
                    centroids = []
                    for _ in range(k):
                        cx = int(data[idx]); idx += 1
                        cy = int(data[idx]); idx += 1
                        centroids.append([float(cx), float(cy)])
                    points = []
                    for _ in range(n):
                        px = int(data[idx]); idx += 1
                        py = int(data[idx]); idx += 1
                        points.append((float(px), float(py)))
                    # Assign step
                    clusters = [[] for _ in range(k)]
                    for px, py in points:
                        best_i = 0
                        best_d = float('inf')
                        for i, (cx, cy) in enumerate(centroids):
                            d = math.sqrt((px - cx) ** 2 + (py - cy) ** 2)
                            if d < best_d:
                                best_d = d
                                best_i = i
                        clusters[best_i].append((px, py))
                    # Update step
                    for i in range(k):
                        if clusters[i]:
                            centroids[i][0] = sum(x for x, y in clusters[i]) / len(clusters[i])
                            centroids[i][1] = sum(y for x, y in clusters[i]) / len(clusters[i])
                    for cx, cy in centroids:
                        print(f"{cx:.4f} {cy:.4f}")

                solve()
            test_cases:
              - name: two-cluster-1d
                stdin: "2 4\n0 0\n10 0\n1 0\n2 0\n9 0\n11 0\n"
                expected_stdout: "1.5000 0.0000\n10.0000 0.0000"
                is_hidden: false
                weight: 1
              - name: two-cluster-2d
                stdin: "2 4\n1 1\n4 4\n1 1\n1 2\n4 4\n4 5\n"
