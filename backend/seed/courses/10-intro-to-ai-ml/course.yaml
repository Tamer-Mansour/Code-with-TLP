                    print(f"{0:.4f}")

                solve()
            solution_code:
              python: |
                import sys
                import math

                def binary_entropy(pos, total):
                    if total == 0:
                        return 0.0
                    p = pos / total
                    q = 1.0 - p
                    if p == 0 or q == 0:
                        return 0.0
                    return -(p * math.log2(p) + q * math.log2(q))

                def solve():
                    data = sys.stdin.read().split()
                    n = int(data[0])
                    n_pos = int(data[1])
                    n_left = int(data[2])
                    n_left_pos = int(data[3])
                    n_right = n - n_left
                    n_right_pos = n_pos - n_left_pos
                    parent_e = binary_entropy(n_pos, n)
                    left_e = binary_entropy(n_left_pos, n_left)
                    right_e = binary_entropy(n_right_pos, n_right)
                    weighted_e = (n_left / n) * left_e + (n_right / n) * right_e
                    gain = parent_e - weighted_e
                    print(f"{parent_e:.4f}")
                    print(f"{left_e:.4f}")
                    print(f"{right_e:.4f}")
                    print(f"{weighted_e:.4f}")
                    print(f"{gain:.4f}")

                solve()
            test_cases:
              - name: perfect-split
