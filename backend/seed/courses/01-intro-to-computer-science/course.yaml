            solution_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        line = line.strip()
                        if not line:
                            continue
                        n = int(line)
                        count = 0
                        while n > 0:
                            count += n & 1
                            n >>= 1
                        print(count)

                solve()
