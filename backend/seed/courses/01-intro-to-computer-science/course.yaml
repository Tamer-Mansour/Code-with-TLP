            solution_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        line = line.strip()
                        if not line:
                            continue
                        lst = list(map(int, line.split()))
                        n = len(lst)
                        for i in range(n - 1):
                            swapped = False
                            for j in range(n - 1 - i):
                                if lst[j] > lst[j + 1]:
                                    lst[j], lst[j + 1] = lst[j + 1], lst[j]
                                    swapped = True
                            if swapped:
                                print(' '.join(map(str, lst)))
                            else:
                                print('sorted: ' + ' '.join(map(str, lst)))
                                break
                        else:
                            print('sorted: ' + ' '.join(map(str, lst)))

                solve()
            test_cases:
