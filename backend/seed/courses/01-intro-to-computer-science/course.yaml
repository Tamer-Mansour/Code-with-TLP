            solution_code:
              python: |
                import sys

                def solve():
                    for line in sys.stdin:
                        line = line.strip()
                        if not line:
                            continue
                        parts = line.split()
                        if parts[0] == 'NOT':
                            a = parts[1] == '1'
                            print(not a)
                        else:
                            a = parts[0] == '1'
                            op = parts[1]
                            b = parts[2] == '1'
                            if op == 'AND':
                                print(a and b)
                            elif op == 'OR':
                                print(a or b)
                            elif op == 'XOR':
                                print(a != b)

                solve()
