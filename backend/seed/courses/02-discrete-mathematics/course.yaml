            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    base = int(data[0])
                    exp  = int(data[1])
                    mod  = int(data[2])

                    # Fast modular exponentiation (repeated squaring)
                    result = 1
                    base = base % mod
                    while exp > 0:
                        if exp % 2 == 1:
                            result = (result * base) % mod
                        exp //= 2
                        base = (base * base) % mod
                    print(result)

                solve()
            test_cases:
