            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    N = int(data[idx]); idx += 1
                    M = int(data[idx]); idx += 1
                    adj = [[] for _ in range(N + 1)]
                    for _ in range(M):
                        u = int(data[idx]); idx += 1
                        v = int(data[idx]); idx += 1
                        adj[u].append(v)

                    # DP: dp[v] = number of paths from 1 to v
                    # Process vertices in topological order (1..N since edges go low->high)
                    dp = [0] * (N + 1)
                    dp[1] = 1
                    for u in range(1, N + 1):
                        if dp[u] > 0:
                            for v in adj[u]:
                                dp[v] += dp[u]

                    print(dp[N])

                solve()
