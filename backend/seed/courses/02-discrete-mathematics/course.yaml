                    data = sys.stdin.read().split()
                    n, r = int(data[0]), int(data[1])
                    # TODO: compute C(n, r)
                    print(0)

                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    n, r = int(data[0]), int(data[1])

                    if r < 0 or r > n:
                        print(0)
                        return

                    # Multiplicative formula: C(n,r) = product of (n-i)/(i+1) for i in 0..r-1
                    result = 1
                    for i in range(r):
                        result = result * (n - i) // (i + 1)
                    print(result)

                solve()
