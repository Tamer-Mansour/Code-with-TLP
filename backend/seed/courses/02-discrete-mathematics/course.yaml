            solution_code:
              python: |
                import sys

                def solve():
                    n = int(sys.stdin.read().strip())
                    if n < 2:
                        print(0)
                        return
                    is_prime = [True] * (n + 1)
                    is_prime[0] = is_prime[1] = False
                    p = 2
                    while p * p <= n:
                        if is_prime[p]:
                            for k in range(p * p, n + 1, p):
                                is_prime[k] = False
                        p += 1
                    print(sum(is_prime))

                solve()
