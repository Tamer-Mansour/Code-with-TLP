            title: Longest Prefix Match Router
            difficulty: hard
            points: 25
            prompt_file: lessons/net-lpm.prompt.md
            supported_languages: [python]
            tags: [networking, routing, ip, algorithms, longest-prefix-match]
            time_limit_ms: 3000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    routes = []
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        routes.append((parts[0], parts[1]))
                    dst = data[n + 1].strip()
                    # TODO: find the longest-prefix-matching route and print next-hop
                    pass

                solve()
            solution_code:
              python: |
                import sys

                def ip_to_int(s):
                    p = list(map(int, s.split('.')))
                    return (p[0] << 24) | (p[1] << 16) | (p[2] << 8) | p[3]

                def solve():
                    data = sys.stdin.read().splitlines()
                    n = int(data[0])
                    routes = []
                    for i in range(1, n + 1):
                        parts = data[i].split()
                        routes.append((parts[0], parts[1]))
                    dst_str = data[n + 1].strip()
                    dst = ip_to_int(dst_str)

                    best_len = -1
                    best_hop = None
                    for (cidr, hop) in routes:
                        net_str, plen_str = cidr.split('/')
                        plen = int(plen_str)
                        net = ip_to_int(net_str)
                        if plen == 0:
                            mask = 0
                        else:
                            mask = (0xFFFFFFFF << (32 - plen)) & 0xFFFFFFFF
                        if (dst & mask) == (net & mask):
                            if plen > best_len:
                                best_len = plen
                                best_hop = hop

                    print(best_hop)

                solve()
            test_cases:
              - name: specific-match
                stdin: "3\n10.0.1.0/24 eth0\n10.0.0.0/8 eth1\n0.0.0.0/0 eth2\n10.0.1.45\n"
                expected_stdout: "eth0"
                is_hidden: false
                weight: 1
              - name: medium-match
