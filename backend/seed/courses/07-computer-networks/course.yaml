            starter_code:
              python: |
                import sys

                def solve():
                    line = sys.stdin.read().strip()
                    if '.' in line:
                        # Input is dotted-decimal mask -> output prefix length
                        pass
                    else:
                        # Input is prefix length integer -> output dotted-decimal mask
                        pass

                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    line = sys.stdin.read().strip()
                    if '.' in line:
                        parts = list(map(int, line.split('.')))
                        mask = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]
                        prefix = bin(mask).count('1')
                        print(f"Prefix: {prefix}")
                    else:
                        prefix = int(line)
                        if prefix == 0:
                            mask = 0
                        else:
                            mask = (0xFFFFFFFF << (32 - prefix)) & 0xFFFFFFFF
                        a = (mask >> 24) & 0xFF
                        b = (mask >> 16) & 0xFF
                        c = (mask >> 8) & 0xFF
                        d = mask & 0xFF
                        print(f"Mask: {a}.{b}.{c}.{d}")

                solve()
            test_cases:
