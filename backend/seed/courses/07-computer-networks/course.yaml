            starter_code:
              python: |
                import sys

                def solve():
                    line = sys.stdin.read().strip()
                    ip_str, prefix_str = line.split('/')
                    prefix = int(prefix_str)
                    # TODO: compute and print network, broadcast, first, last, usable
