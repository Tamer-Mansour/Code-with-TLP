                    data = sys.stdin.read().split()
                    ip_str = data[0]
                    prefix = int(data[1])
                    # TODO: compute network address and usable host count
                    pass

                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    ip_str = data[0]
                    prefix = int(data[1])

                    parts = list(map(int, ip_str.split('.')))
                    ip_int = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]

                    mask = (0xFFFFFFFF << (32 - prefix)) & 0xFFFFFFFF
                    network_int = ip_int & mask

                    a = (network_int >> 24) & 0xFF
                    b = (network_int >> 16) & 0xFF
                    c = (network_int >> 8) & 0xFF
                    d = network_int & 0xFF

                    hosts = (1 << (32 - prefix)) - 2
                    print(f"Network: {a}.{b}.{c}.{d}")
                    print(f"Hosts: {hosts}")

                solve()
            test_cases:
