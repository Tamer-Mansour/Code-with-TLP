                solve()
            solution_code:
              python: |
                import sys

                def solve():
                    line = sys.stdin.read().strip()
                    ip_str, prefix_str = line.split('/')
                    prefix = int(prefix_str)

                    parts = list(map(int, ip_str.split('.')))
                    ip_int = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]

                    mask = (0xFFFFFFFF << (32 - prefix)) & 0xFFFFFFFF
                    network_int = ip_int & mask
                    broadcast_int = network_int | (~mask & 0xFFFFFFFF)
                    first_host_int = network_int + 1
                    last_host_int = broadcast_int - 1
                    usable = (1 << (32 - prefix)) - 2

                    def to_dot(n):
                        return (f"{(n >> 24) & 0xFF}.{(n >> 16) & 0xFF}"
                                f".{(n >> 8) & 0xFF}.{n & 0xFF}")

                    print(f"Network: {to_dot(network_int)}")
                    print(f"Broadcast: {to_dot(broadcast_int)}")
                    print(f"First: {to_dot(first_host_int)}")
                    print(f"Last: {to_dot(last_host_int)}")
                    print(f"Usable: {usable}")

                solve()
            test_cases:
