            solution_code:
              python: |
                import sys

                def solve():
                    words = list(map(int, sys.stdin.read().split()))
                    total = sum(words)
                    while total >> 16:
                        total = (total >> 16) + (total & 0xFFFF)
                    checksum = (~total) & 0xFFFF
                    print(checksum)

                solve()
