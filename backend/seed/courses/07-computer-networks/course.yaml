  title: Computer Networks
  summary: "Packets, protocols, and the Internet: from Ethernet frames to TLS, covering every layer of the TCP/IP stack."
  description: |
    A top-down tour of computer networking covering the protocols that power the Internet,
    from HTTP and DNS at the application layer down through TCP/IP, Ethernet, and MAC addressing.
    Builds the mental model every software engineer needs to design, debug, and secure networked systems.
    Exercises reinforce IP arithmetic, checksum computation, and HTTP parsing.
  difficulty: intermediate
  estimated_hours: 28
  is_published: true
  order_index: 3

