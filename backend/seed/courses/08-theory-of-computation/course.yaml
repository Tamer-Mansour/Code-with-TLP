            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split('\n')
                    idx = 0
                    V, R = map(int, data[idx].split()); idx += 1
                    var_names = data[idx].split(); idx += 1
                    start = int(data[idx]); idx += 1
                    binary_rules = []
                    terminal_rules = []
                    for _ in range(R):
                        parts = data[idx].split(); idx += 1
                        if len(parts) == 3:
                            binary_rules.append((int(parts[0]), int(parts[1]), int(parts[2])))
                        else:
                            terminal_rules.append((int(parts[0]), parts[1]))
                    word = data[idx] if idx < len(data) else ''
                    n = len(word)
                    if n == 0:
                        print("reject")
                        return

                    # T[i][j] = set of variable indices that derive word[i..j]
                    T = [[set() for _ in range(n)] for _ in range(n)]

                    # Base case: length-1 substrings
                    for i in range(n):
                        for A, c in terminal_rules:
                            if c == word[i]:
                                T[i][i].add(A)

                    # Fill for increasing lengths
                    for length in range(2, n + 1):
                        for i in range(n - length + 1):
                            j = i + length - 1
                            for k in range(i, j):
                                for A, B, C in binary_rules:
                                    if B in T[i][k] and C in T[k+1][j]:
                                        T[i][j].add(A)

                    print("accept" if start in T[0][n-1] else "reject")

                solve()
            test_cases:
