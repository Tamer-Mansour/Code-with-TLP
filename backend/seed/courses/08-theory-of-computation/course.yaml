                import sys

                def solve():
                    data = sys.stdin.read().split('\n')
                    idx = 0
                    n, a = map(int, data[idx].split()); idx += 1
                    alphabet = data[idx].split(); idx += 1
                    transitions = []
                    for i in range(n):
                        row = list(map(int, data[idx].split())); idx += 1
                        transitions.append({alphabet[j]: row[j] for j in range(a)})
                    start = int(data[idx]); idx += 1
                    accept = set(map(int, data[idx].split())); idx += 1
                    N = int(data[idx])
                    dp = [0] * n
                    dp[start] = 1
                    for _ in range(N):
                        ndp = [0] * n
                        for s in range(n):
                            if dp[s] == 0:
                                continue
                            for sym in alphabet:
                                ndp[transitions[s][sym]] += dp[s]
                        dp = ndp
                    print(sum(dp[s] for s in accept))

                solve()
