            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split('\n')
                    idx = 0
                    n_states, n_tape_syms = map(int, data[idx].split()); idx += 1
                    tape_symbols = data[idx].split(); idx += 1
                    accept_state = int(data[idx]); idx += 1
                    reject_state = int(data[idx]); idx += 1
                    n_trans = int(data[idx]); idx += 1
                    transitions = {}
                    for _ in range(n_trans):
                        parts = data[idx].split(); idx += 1
                        transitions[(int(parts[0]), parts[1])] = (int(parts[2]), parts[3], parts[4])
                    start_state = int(data[idx]); idx += 1
                    step_limit = int(data[idx]); idx += 1
                    input_string = data[idx] if idx < len(data) else ""
                    BLANK = '_'
                    tape = list(input_string) if input_string else []
                    state = start_state
                    head = 0
                    for _ in range(step_limit):
                        if state == accept_state:
                            print("accept")
                            return
                        if state == reject_state:
                            print("reject")
                            return
                        while head >= len(tape):
                            tape.append(BLANK)
                        sym = tape[head]
                        if (state, sym) not in transitions:
                            print("reject")
                            return
                        new_state, new_sym, direction = transitions[(state, sym)]
                        tape[head] = new_sym
                        state = new_state
                        if direction == 'R':
                            head += 1
                        else:
                            head = max(0, head - 1)
                    if state == accept_state:
                        print("accept")
                    elif state == reject_state:
                        print("reject")
                    else:
                        print("loop")

                solve()
            test_cases:
              - name: allzeros-accept-three
                stdin: "3 3\n0 1 _\n1\n2\n3\n0 0 0 0 R\n0 _ 1 _ R\n0 1 2 1 R\n0\n100\n000"
