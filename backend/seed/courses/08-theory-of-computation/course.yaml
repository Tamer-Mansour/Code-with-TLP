            solution_code:
              python: |
                import sys
                from collections import deque

                def solve():
                    data = sys.stdin.read().split('\n')
                    idx = 0
                    n, a = map(int, data[idx].split()); idx += 1
                    alphabet = data[idx].split(); idx += 1
                    delta = [[set() for _ in range(a + 1)] for _ in range(n)]
                    for state in range(n):
                        for si in range(a + 1):
                            line = data[idx].strip(); idx += 1
                            if line != '-':
                                for dst in line.split():
                                    delta[state][si].add(int(dst))
                    start = int(data[idx]); idx += 1
                    k = int(data[idx]); idx += 1
                    accept = set(map(int, data[idx].split())); idx += 1
                    word = data[idx] if idx < len(data) else ''

                    def eps_close(states):
                        closed = set(states)
                        queue = deque(states)
                        while queue:
                            q = queue.popleft()
                            for r in delta[q][a]:
                                if r not in closed:
                                    closed.add(r)
                                    queue.append(r)
                        return closed

                    current = eps_close({start})
                    for ch in word:
                        si = alphabet.index(ch)
                        nxt = set()
                        for q in current:
                            nxt |= delta[q][si]
                        current = eps_close(nxt)

                    print("accept" if current & accept else "reject")

                solve()
            test_cases:
