            solution_code:
              python: |
                import sys
                import math

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    C = int(data[idx]); idx += 1
                    B = int(data[idx]); idx += 1
                    N = int(data[idx]); idx += 1
                    addresses = [int(data[idx + i]) for i in range(N)]

                    offset_bits = int(math.log2(B))
                    index_bits = int(math.log2(C))
                    cache = {}  # set_index -> tag

                    hits = 0
                    misses = 0
                    for addr in addresses:
                        index = (addr >> offset_bits) & (C - 1)
                        tag = addr >> (offset_bits + index_bits)
                        if cache.get(index) == tag:
                            hits += 1
                        else:
                            misses += 1
                            cache[index] = tag

                    print(hits, misses)

                solve()
            test_cases:
