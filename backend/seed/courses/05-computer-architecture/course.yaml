                expected_stdout: "4 2"
                is_hidden: true
                weight: 1
              - name: case-6
                stdin: "4 16 2 8\n0\n16\n32\n48\n0\n16\n32\n48\n"
                expected_stdout: "4 4"
                is_hidden: true
                weight: 1
              - name: case-7
