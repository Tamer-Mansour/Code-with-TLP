            supported_languages: [python]
            tags: [cache, set-associative, LRU, simulation]
            time_limit_ms: 5000
            memory_limit_mb: 256
            starter_code:
              python: |
                import sys
                import math

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    C = int(data[idx]); idx += 1
                    B = int(data[idx]); idx += 1
                    N = int(data[idx]); idx += 1
                    K = int(data[idx]); idx += 1
                    addresses = [int(data[idx + i]) for i in range(K)]
                    # TODO: simulate N-way set-associative cache with LRU replacement
                    hits = 0
                    misses = 0
                    print(hits, misses)

                solve()
            solution_code:
              python: |
                import sys
                import math
                from collections import OrderedDict

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    C = int(data[idx]); idx += 1
                    B = int(data[idx]); idx += 1
                    N = int(data[idx]); idx += 1
                    K = int(data[idx]); idx += 1
                    addresses = [int(data[idx + i]) for i in range(K)]

                    offset_bits = int(math.log2(B))
                    index_bits = int(math.log2(C))
                    # Each set: OrderedDict tag->True, LRU = leftmost
                    sets = [OrderedDict() for _ in range(C)]

                    hits = 0
                    misses = 0
                    for addr in addresses:
                        set_index = (addr >> offset_bits) & (C - 1)
                        tag = addr >> (offset_bits + index_bits)
                        s = sets[set_index]
                        if tag in s:
                            hits += 1
                            s.move_to_end(tag)
                        else:
                            misses += 1
                            if len(s) >= N:
                                s.popitem(last=False)
                            s[tag] = True

                    print(hits, misses)

                solve()
            test_cases:
              - name: case-1
                stdin: "2 4 2 6\n0\n16\n0\n16\n0\n16\n"
                expected_stdout: "4 2"
                is_hidden: false
