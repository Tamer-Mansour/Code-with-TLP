              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    n = int(data[idx]); idx += 1
                    processes = []
                    for i in range(n):
                        arrival = int(data[idx]); idx += 1
                        burst   = int(data[idx]); idx += 1
                        processes.append((arrival, burst, i + 1))
                    processes.sort(key=lambda x: (x[0], x[2]))
                    time = 0
                    total_wait = 0
                    for arrival, burst, pid in processes:
                        if time < arrival:
                            time = arrival
                        total_wait += time - arrival
                        time += burst
                    print(total_wait // n)

                solve()
