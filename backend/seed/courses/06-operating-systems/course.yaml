            solution_code:
              python: |
                import sys
                from collections import defaultdict

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    n = int(data[idx]); idx += 1
                    m = int(data[idx]); idx += 1
                    graph = defaultdict(list)
                    for _ in range(m):
                        u = int(data[idx]); idx += 1
                        v = int(data[idx]); idx += 1
                        graph[u].append(v)

                    visited = set()
                    in_stack = set()

                    def dfs(node):
                        visited.add(node)
                        in_stack.add(node)
                        for nb in graph[node]:
                            if nb not in visited:
                                if dfs(nb):
                                    return True
                            elif nb in in_stack:
                                return True
                        in_stack.remove(node)
                        return False

                    for node in range(1, n + 1):
                        if node not in visited:
                            if dfs(node):
                                print("YES")
                                return
                    print("NO")

                solve()
            test_cases:
              - name: case-simple-cycle
                stdin: "3 3\n1 2\n2 3\n3 1\n"
                expected_stdout: "YES"
                is_hidden: false
                weight: 1
              - name: case-no-cycle-chain
