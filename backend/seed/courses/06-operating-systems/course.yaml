            solution_code:
              python: |
                import sys
                from collections import deque

                def solve():
                    data = sys.stdin.read().split()
                    n = int(data[0])
                    q = int(data[1])
                    bursts = list(map(int, data[2:2 + n]))
                    remaining = list(bursts)
                    queue = deque(range(n))
                    time = 0
                    finish = [0] * n
                    while queue:
                        i = queue.popleft()
                        if remaining[i] <= q:
                            time += remaining[i]
                            remaining[i] = 0
                            finish[i] = time
                        else:
                            remaining[i] -= q
                            time += q
                            queue.append(i)
                    total_wait = sum(finish[i] - bursts[i] for i in range(n))
                    print(total_wait // n)

                solve()
