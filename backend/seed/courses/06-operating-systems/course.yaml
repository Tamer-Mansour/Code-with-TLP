            solution_code:
              python: |
                import sys
                from collections import deque

                def solve():
                    data = sys.stdin.read().split()
                    f = int(data[0])
                    n = int(data[1])
                    refs = list(map(int, data[2:2 + n]))
                    queue = deque()
                    in_mem = set()
                    faults = 0
                    for page in refs:
                        if page not in in_mem:
                            faults += 1
                            if len(queue) == f:
                                evicted = queue.popleft()
                                in_mem.remove(evicted)
                            queue.append(page)
                            in_mem.add(page)
                    print(faults)

                solve()
            test_cases:
