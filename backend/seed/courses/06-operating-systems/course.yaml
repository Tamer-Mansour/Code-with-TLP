            solution_code:
              python: |
                import sys
                from collections import deque

                def solve():
                    lines = sys.stdin.read().strip().split('\n')
                    first = lines[0].split()
                    cap = int(first[0])
                    k = int(first[1])
                    buf = deque()
                    consumed = []
                    for line in lines[1:k + 1]:
                        parts = line.strip().split()
                        if parts[0] == 'P':
                            item = int(parts[1])
                            if len(buf) < cap:
                                buf.append(item)
                        else:
                            if buf:
                                consumed.append(str(buf.popleft()))
                    print(' '.join(consumed) if consumed else 'EMPTY')

                solve()
            test_cases:
