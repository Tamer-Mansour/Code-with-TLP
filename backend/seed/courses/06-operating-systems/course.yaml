            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    idx = 0
                    n = int(data[idx]); idx += 1
                    m = int(data[idx]); idx += 1
                    available = []
                    for j in range(m):
                        available.append(int(data[idx])); idx += 1
                    allocation = []
                    for i in range(n):
                        row = [int(data[idx + j]) for j in range(m)]
                        idx += m
                        allocation.append(row)
                    need = []
                    for i in range(n):
                        row = [int(data[idx + j]) for j in range(m)]
                        idx += m
                        need.append(row)

                    work = list(available)
                    finish = [False] * n
                    sequence = []
                    changed = True
                    while changed:
                        changed = False
                        for i in range(n):
                            if not finish[i]:
                                if all(need[i][j] <= work[j] for j in range(m)):
                                    for j in range(m):
                                        work[j] += allocation[i][j]
                                    finish[i] = True
                                    sequence.append(i + 1)
                                    changed = True
                    if all(finish):
                        print("SAFE " + " ".join(map(str, sequence)))
                    else:
                        print("UNSAFE")

                solve()
            test_cases:
