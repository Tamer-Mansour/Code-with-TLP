                import sys

                def solve():
                    data = sys.stdin.read().split()
                    f = int(data[0])
                    n = int(data[1])
                    refs = list(map(int, data[2:2 + n]))
                    memory = []
                    faults = 0
                    for page in refs:
                        if page in memory:
                            memory.remove(page)
                            memory.append(page)
                        else:
                            faults += 1
                            if len(memory) == f:
                                memory.pop(0)
                            memory.append(page)
                    print(faults)

                solve()
            test_cases:
