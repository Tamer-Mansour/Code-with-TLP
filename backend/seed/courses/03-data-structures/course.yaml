            solution_code:
              python: |
                import sys

                def is_balanced(s):
                    match = {')': '(', '}': '{', ']': '['}
                    stack = []
                    for ch in s:
                        if ch in '({[':
                            stack.append(ch)
                        elif ch in ')}]':
                            if not stack or stack[-1] != match[ch]:
                                return False
                            stack.pop()
                    return len(stack) == 0

                def solve():
                    data = sys.stdin.read().splitlines()
                    t = int(data[0])
                    out = []
                    for i in range(1, t + 1):
                        s = data[i].strip()
                        out.append("YES" if is_balanced(s) else "NO")
                    print('\n'.join(out))

                solve()
            test_cases:
              - name: mixed-valid-invalid
                stdin: "4\n()\n()[{}]\n(]\n([)]\n"
                expected_stdout: "YES\nYES\nNO\nNO"
