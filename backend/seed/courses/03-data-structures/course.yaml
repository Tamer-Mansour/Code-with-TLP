            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().split()
                    n, t = int(data[0]), int(data[1])
                    nums = list(map(int, data[2:2+n]))

                    # Build map: value -> sorted list of indices
                    idx_map = {}
                    for i, x in enumerate(nums):
                        if x not in idx_map:
                            idx_map[x] = []
                        idx_map[x].append(i)

                    pairs = set()
                    for i, x in enumerate(nums):
                        complement = t - x
                        if complement in idx_map:
                            for j in idx_map[complement]:
                                if j > i:
                                    pairs.add((i, j))

                    result = sorted(pairs)
                    if not result:
                        print('NONE')
                    else:
                        print('\n'.join(f'{i} {j}' for i, j in result))

                solve()
            test_cases:
