            solution_code:
              python: |
                import sys

                class Node:
                    def __init__(self, val):
                        self.val = val
                        self.next = None

                def solve():
                    data = sys.stdin.read().split()
                    n = int(data[0])
                    vals = list(map(int, data[1:n+1]))

                    # Build linked list
                    head = None
                    for v in reversed(vals):
                        node = Node(v)
                        node.next = head
                        head = node

                    # Reverse iteratively
                    prev = None
                    cur = head
                    while cur:
                        nxt = cur.next
                        cur.next = prev
                        prev = cur
                        cur = nxt

                    # Print
                    result = []
                    node = prev
                    while node:
                        result.append(str(node.val))
                        node = node.next
                    print(' '.join(result))

                solve()
            test_cases:
