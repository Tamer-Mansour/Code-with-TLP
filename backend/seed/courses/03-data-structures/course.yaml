            solution_code:
              python: |
                import sys

                class TrieNode:
                    def __init__(self):
                        self.children = {}
                        self.is_end = False

                def insert(root, word):
                    node = root
                    for ch in word:
                        if ch not in node.children:
                            node.children[ch] = TrieNode()
                        node = node.children[ch]
                    node.is_end = True

                def classify(root, query):
                    node = root
                    for ch in query:
                        if ch not in node.children:
                            return "NONE"
                        node = node.children[ch]
                    return "WORD" if node.is_end else "PREFIX"

                def solve():
                    data = sys.stdin.read().splitlines()
                    idx = 0
                    n = int(data[idx]); idx += 1
                    root = TrieNode()
                    for _ in range(n):
                        word = data[idx].strip(); idx += 1
                        insert(root, word)
                    q = int(data[idx]); idx += 1
                    out = []
                    for _ in range(q):
                        query = data[idx].strip(); idx += 1
                        out.append(classify(root, query))
                    print('\n'.join(out))

                solve()
            test_cases:
