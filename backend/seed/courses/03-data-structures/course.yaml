            solution_code:
              python: |
                import sys

                def solve():
                    data = sys.stdin.read().splitlines()
                    q = int(data[0])
                    inbox = []
                    outbox = []
                    out = []

                    def transfer():
                        while inbox:
                            outbox.append(inbox.pop())

                    for i in range(1, q + 1):
                        line = data[i].strip()
                        if line.startswith('ENQUEUE'):
                            val = int(line.split()[1])
                            inbox.append(val)
                        elif line == 'DEQUEUE':
                            if not outbox:
                                transfer()
                            out.append(str(outbox.pop()) if outbox else 'EMPTY')
                        elif line == 'FRONT':
                            if not outbox:
                                transfer()
                            out.append(str(outbox[-1]) if outbox else 'EMPTY')
                    print('\n'.join(out))

                solve()
            test_cases:
