                        return []
                    result = []
                    q = deque([root])
                    while q:
                        level_size = len(q)
                        level = []
                        for _ in range(level_size):
                            node = q.popleft()
                            level.append(str(node.val))
                            if node.left:
                                q.append(node.left)
                            if node.right:
                                q.append(node.right)
                        result.append(' '.join(level))
                    return result

                def solve():
                    data = sys.stdin.read().split()
                    n = int(data[0])
                    vals = list(map(int, data[1:n+1]))
                    root = None
                    for v in vals:
                        root = insert(root, v)
                    for line in level_order(root):
                        print(line)

                solve()
