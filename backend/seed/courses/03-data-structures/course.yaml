              python: |
                import sys
                from collections import deque

                def solve():
                    data = sys.stdin.read().splitlines()
                    C, Q = map(int, data[0].split())
                    cache = {}     # key -> value
                    order = deque()  # insertion order (new keys only)
                    out = []

                    for i in range(1, Q + 1):
                        parts = data[i].split()
                        if parts[0] == 'GET':
                            key = int(parts[1])
                            if key in cache:
                                out.append(str(cache[key]))
                            else:
                                out.append('MISS')
                        else:
                            key, val = int(parts[1]), int(parts[2])
                            if key in cache:
                                cache[key] = val   # update; eviction order unchanged
                            else:
                                if len(cache) == C:
                                    evict = order.popleft()
                                    del cache[evict]
                                cache[key] = val
                                order.append(key)

                    print('\n'.join(out))

                solve()
            test_cases:
              - name: basic-eviction
