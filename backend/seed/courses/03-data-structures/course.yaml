                import sys

                class TreeNode:
                    def __init__(self, val):
                        self.val = val
                        self.left = None
                        self.right = None

                def insert(root, val):
                    if root is None:
                        return TreeNode(val)
                    if val < root.val:
                        root.left = insert(root.left, val)
                    elif val > root.val:
                        root.right = insert(root.right, val)
                    return root

                def inorder(root, result):
                    if root:
                        inorder(root.left, result)
                        result.append(root.val)
                        inorder(root.right, result)

                def solve():
                    data = sys.stdin.read().split()
                    n = int(data[0])
                    vals = list(map(int, data[1:n+1]))
                    root = None
                    for v in vals:
                        root = insert(root, v)
                    result = []
                    inorder(root, result)
                    print(*result)

                solve()
