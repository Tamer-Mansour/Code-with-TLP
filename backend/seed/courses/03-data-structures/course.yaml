                        u, v = int(data[idx]), int(data[idx+1])
                        idx += 2
                        graph[u].append(v)
                        graph[v].append(u)
                    s = int(data[idx])

                    dist = [-1] * V
                    dist[s] = 0
                    q = deque([s])
                    while q:
