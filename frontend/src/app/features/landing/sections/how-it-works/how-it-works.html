<section>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div appReveal class="max-w-2xl mx-auto text-center mb-14">
      <p class="text-sm font-semibold text-brand mb-2">How it works</p>
      <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-app-text">Three steps to mastery</h2>
      <p class="mt-3 text-app-text-2">Go from curious to capable without leaving the browser.</p>
    </div>

    <div class="relative grid gap-8 md:grid-cols-3">
      <!-- connecting line (desktop) -->
      <div class="hidden md:block absolute top-9 left-[16%] right-[16%] h-px bg-gradient-to-r from-purple-500/40 via-blue-500/40 to-cyan-400/40"></div>

      @for (s of steps; track s.n; let i = $index) {
        <div appReveal [revealDelay]="i * 120" class="relative text-center">
          <div class="mx-auto w-18 h-18 mb-5 grid place-items-center">
            <div class="relative w-16 h-16 rounded-2xl grid place-items-center bg-gradient-to-br from-purple-500 to-blue-500 text-white shadow-xl shadow-blue-500/25">
              <lucide-icon [img]="s.icon" [size]="26"></lucide-icon>
              <span class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-app-surface border border-app-border text-xs font-bold grid place-items-center text-app-text">{{ s.n }}</span>
            </div>
          </div>
          <h3 class="text-lg font-semibold text-app-text mb-2">{{ s.title }}</h3>
          <p class="text-sm text-app-text-2 leading-relaxed max-w-xs mx-auto">{{ s.text }}</p>
        </div>
      }
    </div>
  </div>
</section>
