<section>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div appReveal class="max-w-2xl mx-auto text-center mb-14">
      <p class="text-sm font-semibold text-brand mb-2">Gamified progress</p>
      <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-app-text">Level up as you learn</h2>
      <p class="mt-3 text-app-text-2">Every lesson and solved challenge earns XP. Climb eight ranks from Newcomer to Legend.</p>
    </div>

    <div class="relative">
      <div class="hidden lg:block absolute top-8 left-[6%] right-[6%] h-px bg-gradient-to-r from-app-border via-brand/40 to-app-border"></div>
      <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-6">
        @for (t of tiers; track t.name; let i = $index) {
          <div appReveal [revealDelay]="i * 70" class="relative flex flex-col items-center text-center">
            <div class="relative w-16 h-16 rounded-2xl grid place-items-center border-2 bg-app-surface"
                 [class.rank-glow-ring]="t.here"
                 [style.color]="t.color" [style.borderColor]="t.color">
              <lucide-icon [img]="Trophy" [size]="24"></lucide-icon>
            </div>
            @if (t.here) {
              <span class="mt-2 text-[10px] font-bold uppercase tracking-wide text-brand">You are here</span>
            } @else {
              <span class="mt-2 text-[10px] font-medium uppercase tracking-wide text-app-text-muted">{{ t.xp }} XP</span>
            }
            <span class="mt-1 text-sm font-semibold text-app-text">{{ t.name }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
