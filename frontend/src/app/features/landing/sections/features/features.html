<section id="features">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div appReveal class="max-w-2xl mb-12">
      <p class="text-sm font-semibold text-brand mb-2">Everything in one place</p>
      <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-app-text">
        Learn CS by reading, coding, and seeing it work
      </h2>
      <p class="mt-3 text-app-text-2">A complete toolkit — lessons, a real code runner, visualizers, an AI tutor, and gamified progress.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:auto-rows-[minmax(11rem,1fr)]">
      @for (f of features; track f.title; let i = $index) {
        <div appReveal [revealDelay]="delayMap[i]" class="group" [ngClass]="f.colSpan + ' ' + f.rowSpan">
          <div class="h-full rounded-2xl p-px transition-transform duration-200 group-hover:-translate-y-1"
               [ngClass]="f.accent ? 'bg-gradient-to-br from-purple-500 to-blue-500' : 'bg-app-border'">
            <div class="h-full rounded-2xl bg-app-surface p-6 flex flex-col">
              <div class="w-11 h-11 rounded-xl grid place-items-center mb-4"
                   [ngClass]="f.accent ? 'bg-gradient-to-br from-purple-500 to-blue-500 text-white' : 'bg-app-surface-2 text-brand'">
                <lucide-icon [img]="f.icon" [size]="20"></lucide-icon>
              </div>
              <h3 class="font-semibold text-app-text mb-1.5" [class.text-lg]="f.accent">{{ f.title }}</h3>
              <p class="text-sm text-app-text-2 leading-relaxed">{{ f.description }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
