<section id="visualize">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28 grid lg:grid-cols-2 gap-12 items-center">
    <!-- live bar-sort demo -->
    <div appReveal="left" class="relative order-2 lg:order-1">
      <div class="absolute -inset-4 bg-gradient-to-br from-blue-500/15 to-purple-500/15 blur-2xl rounded-3xl"></div>
      <div class="relative rounded-2xl border border-app-border bg-app-surface shadow-2xl p-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-mono text-app-text-muted">bubble_sort.viz</span>
          <span class="text-xs font-medium text-brand">live</span>
        </div>
        <div class="flex items-end gap-1.5 h-56">
          @for (h of bars(); track $index; let idx = $index) {
            <div class="flex-1 rounded-t-md transition-all duration-300 ease-out"
                 [style.height.%]="h"
                 [ngClass]="(idx === aIdx() || idx === bIdx()) ? 'bg-amber-400' : 'bg-gradient-to-t from-blue-500 to-purple-500'"></div>
          }
        </div>
      </div>
    </div>

    <!-- copy -->
    <div appReveal="right" class="order-1 lg:order-2">
      <p class="text-sm font-semibold text-brand mb-2">See it, don't just read it</p>
      <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-app-text">Watch algorithms come alive</h2>
      <p class="mt-3 text-app-text-2 leading-relaxed">
        Step through sorting, searching, trees, and graphs with VisuAlgo-style visualizers —
        play, pause, and step at your own pace until the idea clicks.
      </p>
      <button type="button"
        class="mt-8 inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold no-underline text-app-text border border-app-border bg-app-surface hover:bg-app-surface-2 transition-colors">
        Explore visualizers
        <lucide-icon [img]="ArrowRight" [size]="16" class="text-brand"></lucide-icon>
      </button>
    </div>
  </div>
</section>
