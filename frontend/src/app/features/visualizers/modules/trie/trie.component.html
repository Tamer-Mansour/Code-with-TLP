<div class="p-4 flex flex-col gap-4">

  <!-- ── Controls row ──────────────────────────────────────────────────────── -->
  <div class="flex flex-wrap items-center gap-3 p-3 rounded-xl
              bg-app-surface-2 border border-app-border">

    <!-- Operation selector -->
    <div class="flex items-center gap-1 p-0.5 rounded-lg
                bg-app-surface border border-app-border">
      @for (op of ['Insert', 'Search', 'Starts-With']; track op) {
        <button
          (click)="onSetOp(op === 'Insert' ? 'Insert' : op === 'Search' ? 'Search' : 'Starts-With')"
          [class]="activeOp() === op
            ? 'px-3 py-1 rounded-md text-xs font-semibold text-white bg-gradient-to-br from-violet-500 to-blue-500 shadow-sm transition-all'
            : 'px-3 py-1 rounded-md text-xs font-medium text-app-text-2 hover:text-app-text transition-all'"
        >
          {{ op }}
        </button>
      }
    </div>

    <!-- Word / prefix input -->
    <div class="flex items-center gap-1.5">
      <input
        type="text"
        [value]="wordInput()"
        (input)="onInput($event)"
        (keydown)="onKeydown($event)"
        [placeholder]="activeOp() === 'Starts-With' ? 'prefix' : 'word'"
        maxlength="12"
        class="w-28 px-2 py-1.5 rounded-lg text-sm font-mono
               bg-app-surface border border-app-border text-app-text
               focus:outline-none focus:ring-2 focus:ring-brand/50
               placeholder:text-app-text-muted"
      />
      <button
        (click)="onRun()"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold
               text-white bg-gradient-to-br from-violet-500 to-blue-500
               hover:from-violet-600 hover:to-blue-600
               disabled:opacity-40 disabled:cursor-not-allowed transition-all"
        [disabled]="!wordInput().trim()"
      >
        @if (activeOp() === 'Insert') {
          <lucide-icon [img]="Plus" [size]="13"></lucide-icon>
        } @else {
          <lucide-icon [img]="Search" [size]="13"></lucide-icon>
        }
        {{ activeOp() }}
      </button>
    </div>

    <!-- Reset -->
    <button
      (click)="onReset()"
      class="ml-auto flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold
             text-app-text-2 hover:text-app-text bg-app-surface border border-app-border
             hover:bg-app-surface-2 transition-all"
    >
      <lucide-icon [img]="RotateCcw" [size]="13"></lucide-icon>
      Reset
    </button>
  </div>

  <!-- ── SVG stage ──────────────────────────────────────────────────────────── -->
  <div class="relative rounded-xl border border-app-border overflow-auto
              bg-gradient-to-b from-app-surface to-app-surface-2 min-h-[360px]">

    <!-- Radial glow accent -->
    <div class="absolute inset-x-0 top-0 h-28 pointer-events-none
                bg-[radial-gradient(ellipse_at_50%_0%,rgba(139,92,246,0.12),transparent_70%)]">
    </div>

    <!-- Trie root label badge -->
    <div class="absolute top-2 left-1/2 -translate-x-1/2
                text-[10px] font-mono text-app-text-muted
                px-2 py-0.5 rounded-full border border-app-border bg-app-surface z-10
                pointer-events-none select-none">
      root
    </div>

    <!-- SVG canvas -->
    <svg
      class="block overflow-visible"
      [attr.width]="svgLayout().width"
      [attr.height]="svgLayout().height"
      [attr.viewBox]="'0 0 ' + svgLayout().width + ' ' + svgLayout().height"
    >
      <defs>
        <!-- Edge arrow marker — default -->
        <marker id="arrow-default" markerWidth="6" markerHeight="6"
                refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L6,3 z" class="fill-app-border"></path>
        </marker>
        <!-- Edge arrow marker — active/highlighted -->
        <marker id="arrow-active" markerWidth="6" markerHeight="6"
                refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L6,3 z" fill="rgb(139,92,246)"></path>
        </marker>

        <!-- Node fill gradient — default -->
        <radialGradient id="grad-default" cx="35%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="rgb(var(--color-app-surface-2))"></stop>
          <stop offset="100%" stop-color="rgb(var(--color-app-surface))"></stop>
        </radialGradient>
      </defs>

      <!-- Edges (drawn first so nodes sit on top) -->
      @for (edge of svgLayout().edges; track $index) {
        <g>
          <line
            [attr.x1]="edge.x1"
            [attr.y1]="edge.y1"
            [attr.x2]="edge.x2"
            [attr.y2]="edge.y2"
            [attr.class]="edgeClass(edge.state)"
            fill="none"
          ></line>
          <!-- Edge character label -->
          <text
            [attr.x]="edge.labelX + 6"
            [attr.y]="edge.labelY + 4"
            text-anchor="middle"
            dominant-baseline="middle"
            [attr.class]="edgeLabelClass(edge.state)"
          >{{ edge.label }}</text>
        </g>
      }

      <!-- Nodes -->
      @for (node of svgLayout().nodes; track node.id) {
        <g [attr.transform]="'translate(' + node.cx + ',' + node.cy + ')'">

          <!-- Outer ring for word-end nodes -->
          @if (node.isEnd || node.state === 'word-end') {
            <circle
              [attr.r]="NODE_R + 4"
              class="fill-none stroke-violet-400/50 stroke-[1.5] animate-pulse-soft"
            ></circle>
          }

          <!-- Main circle -->
          <circle
            [attr.r]="NODE_R"
            [attr.class]="nodeCircleClass(node.state)"
          ></circle>

          <!-- Character label -->
          @if (node.char) {
            <text
              text-anchor="middle"
              dominant-baseline="central"
              [attr.y]="0"
              font-size="13"
              [attr.class]="nodeTextClass(node.state)"
            >{{ node.char }}</text>
          }

          <!-- Root dot -->
          @if (!node.char) {
            <circle r="4" class="fill-app-text-muted"></circle>
          }
        </g>
      }
    </svg>
  </div>

  <!-- ── Legend ─────────────────────────────────────────────────────────────── -->
  <div class="flex flex-wrap gap-x-5 gap-y-1.5 text-xs text-app-text-muted">
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-app-surface-2 border border-app-border inline-block"></span>
      idle node
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-amber-400 inline-block"></span>
      current
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span>
      on path
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-emerald-400 inline-block"></span>
      created
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span>
      word-end
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>
      miss
    </span>
    <span class="flex items-center gap-1.5 ml-auto font-mono text-[11px]">
      m = word length &nbsp;|&nbsp; Insert O(m) &nbsp;|&nbsp; Search O(m) &nbsp;|&nbsp; Starts-With O(m)
    </span>
  </div>

</div>

<style>
  /* Node pop animation — mirrors bst.component pop */
  @keyframes triePop {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* Glow pulse for the 'current' node */
  @keyframes trieGlow {
    from { filter: drop-shadow(0 0 3px rgba(251, 191, 36, 0.5)); }
    to   { filter: drop-shadow(0 0 9px rgba(251, 191, 36, 0.85)); }
  }

  /* SVG fill helpers that complement Tailwind tokens */
  .fill-app-text        { fill: rgb(var(--color-app-text)); }
  .fill-app-text-muted  { fill: rgb(var(--color-app-text-muted)); }
  .fill-app-border      { fill: rgb(var(--color-app-border)); }
  .fill-trie-node       { fill: url(#grad-default); }
  .stroke-trie-border   { stroke: rgb(var(--color-app-border-2)); }
  .stroke-app-border    { stroke: rgb(var(--color-app-border)); }
</style>
