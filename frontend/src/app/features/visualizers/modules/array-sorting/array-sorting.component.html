<div class="p-4 flex flex-col gap-4">

  <!-- Controls row -->
  <div class="flex flex-wrap items-center gap-3 p-3 rounded-xl bg-app-surface-2 border border-app-border">

    <!-- Operation selector -->
    <div class="flex flex-wrap gap-1.5">
      @for (op of operations; track op) {
        <button
          (click)="selectOp(op)"
          class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-150"
          [class.text-white]="selectedOp() === op"
          [class.brand-gradient]="selectedOp() === op"
          [class.text-app-text-2]="selectedOp() !== op"
          [class.bg-app-surface]="selectedOp() !== op"
          [class.border]="selectedOp() !== op"
          [class.border-app-border]="selectedOp() !== op"
        >
          {{ op }}
        </button>
      }
    </div>

    <!-- Target input (search only) -->
    @if (showTarget()) {
      <div class="flex items-center gap-2">
        <span class="text-xs font-semibold uppercase tracking-wide text-app-text-muted">Target</span>
        <input
          type="number"
          [value]="targetVal()"
          (input)="onTargetChange($event)"
          class="w-20 px-2 py-1.5 rounded-lg text-sm bg-app-surface border border-app-border
                 text-app-text focus:outline-none focus:ring-2 focus:ring-brand/50"
          placeholder="value"
        />
      </div>
    }

    <!-- Shuffle -->
    <button
      (click)="generateArray()"
      class="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold
             text-app-text-2 hover:text-app-text bg-app-surface border border-app-border
             hover:bg-app-surface-2 transition-all"
    >
      <lucide-icon [img]="Shuffle" [size]="13"></lucide-icon>
      New Array
    </button>
  </div>

  <!-- Array stage -->
  <div class="relative rounded-xl border border-app-border overflow-hidden
              bg-gradient-to-b from-app-surface to-app-surface-2"
       style="height: 260px;">

    <!-- Radial glow at top -->
    <div class="absolute inset-x-0 top-0 h-24 pointer-events-none
                bg-[radial-gradient(ellipse_at_50%_0%,rgba(var(--color-brand-rgb),0.12),transparent_70%)]"></div>

    <!-- Bars container (flex layout, items at bottom) -->
    <div class="absolute inset-0 flex items-end justify-center gap-[2px] px-4 pb-9">
      @for (bar of displayBars(); track bar.id) {
        <div
          class="relative rounded-t-lg flex-1 max-w-[38px] transition-all duration-300 ease-[cubic-bezier(.4,0,.2,1)] flex items-start justify-center pt-1"
          [ngStyle]="{ height: bar.heightPx + 'px' }"
          [class]="barStateClass(bar.state)"
        >
          <!-- Value label -->
          <span class="text-[10px] font-bold leading-none select-none">{{ bar.value }}</span>
          <!-- Index label -->
          <span class="absolute bottom-[-20px] left-0 right-0 text-center text-[10px] text-app-text-muted font-semibold select-none">
            {{ bar.pos }}
          </span>
        </div>
      }
    </div>
  </div>

  <!-- Legend -->
  <div class="flex flex-wrap gap-x-4 gap-y-1.5 text-xs text-app-text-muted">
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-sm brand-gradient inline-block"></span>
      default
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-sm bg-amber-400 inline-block"></span>
      comparing
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-sm bg-blue-400 inline-block"></span>
      swapping
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-sm bg-cyan-400 inline-block"></span>
      active / mid
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded-sm bg-green-500 inline-block"></span>
      sorted / found
    </span>
  </div>
</div>

<!-- Bar state styles (scoped via inline classes in the host) -->
<style>
  .bar-idle    { background: linear-gradient(180deg, rgb(var(--color-brand-light-rgb)), rgb(var(--color-brand-rgb))); color: #fff; }
  .bar-compare { background: linear-gradient(180deg, #fbbf24, #f59e0b); color: #fff;
                 transform: translateY(-6px); box-shadow: 0 0 0 3px rgba(245,158,11,0.35); }
  .bar-swap    { background: linear-gradient(180deg, rgb(var(--color-brand-light-rgb)), rgb(var(--color-brand-rgb))); color: #fff;
                 transform: scaleX(1.06) translateY(-4px); box-shadow: 0 0 0 3px rgba(var(--color-brand-rgb),0.4); z-index: 3; }
  .bar-active  { background: linear-gradient(180deg, #67e8f9, #06b6d4); color: #fff;
                 box-shadow: 0 0 0 3px rgba(6,182,212,0.4); }
  .bar-sorted  { background: linear-gradient(180deg, #4ade80, #16a34a); color: #fff; }
  .bar-found   { background: linear-gradient(180deg, #4ade80, #16a34a); color: #fff;
                 box-shadow: 0 0 0 3px rgba(34,197,94,0.45); }
  .bar-dim     { background: linear-gradient(180deg, rgba(var(--color-brand-rgb), 0.3), rgba(var(--color-brand-rgb), 0.3)); color: transparent; opacity: 0.35; }
  .bar-range   { background: linear-gradient(180deg, rgba(var(--color-brand-rgb), 0.7), rgba(var(--color-brand-rgb), 0.7)); color: #fff; }
</style>
