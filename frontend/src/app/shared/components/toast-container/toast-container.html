<div
  aria-live="polite"
  aria-label="Notifications"
  class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-3 w-96 pointer-events-none"
>
  @for (toast of toasts; track trackById($index, toast)) {
    <div
      class="tlp-toast pointer-events-auto"
      [class]="'tlp-toast tlp-toast--' + toast.type + ' pointer-events-auto'"
      role="alert"
      [attr.aria-label]="label(toast.type) + ': ' + toast.message"
    >
      <!-- Wavy left edge SVG -->
      <svg
        class="tlp-toast__wave"
        height="96"
        width="16"
        aria-hidden="true"
        [attr.data-variant]="toast.type"
      >
        <path
          stroke-linecap="round"
          stroke-width="2"
          [attr.stroke]="accentColor(toast.type)"
          [attr.fill]="accentColor(toast.type)"
          d="M 8 0 Q 4 4.8, 8 9.6 T 8 19.2 Q 4 24, 8 28.8 T 8 38.4 Q 4 43.2, 8 48 T 8 57.6 Q 4 62.4, 8 67.2 T 8 76.8 Q 4 81.6, 8 86.4 T 8 96 L 0 96 L 0 0 Z"
        />
      </svg>

      <!-- Content area -->
      <div class="tlp-toast__body">
        <p
          class="tlp-toast__title"
          [style.color]="accentColor(toast.type)"
        >{{ label(toast.type) }}</p>
        <p class="tlp-toast__message">{{ toast.message }}</p>
      </div>

      <!-- Close button -->
      <button
        (click)="dismiss(toast.id)"
        class="tlp-toast__close"
        aria-label="Dismiss notification"
        type="button"
      >
        <svg
          class="w-7 h-7"
          fill="none"
          [attr.stroke]="accentColor(toast.type)"
          stroke-width="2"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Auto-dismiss progress bar -->
      @if ((toast.duration ?? 4000) > 0) {
        <div class="tlp-toast__progress-track">
          <div
            class="tlp-toast__progress-bar"
            [class]="'tlp-toast__progress-bar--' + toast.type"
            [style.animation-duration]="animDuration(toast)"
          ></div>
        </div>
      }
    </div>
  }
</div>
